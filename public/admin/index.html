<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <!-- Include the script that enables Netlify Identity on this page. -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // Register a minimal local media library so the CMS 'local' media_library works.
      // This implementation uses the browser file picker and returns data-URLs.
      (function () {
        function readFileAsDataURL(file) {
          return new Promise(function (resolve, reject) {
            var reader = new FileReader();
            reader.onload = function () { resolve({ name: file.name, url: reader.result }); };
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });
        }

        var localLibrary = {
          name: 'local',
          label: 'Local',
          // open should return a Promise that resolves to an array of file objects {name, url}
          open: function () {
            return new Promise(function (resolve) {
              var input = document.createElement('input');
              input.type = 'file';
              input.accept = '*/*';
              input.multiple = true;
              input.onchange = function () {
                var files = Array.prototype.slice.call(input.files || []);
                Promise.all(files.map(readFileAsDataURL)).then(resolve);
              };
              // trigger dialog
              input.click();
            });
          },
          close: function () { /* no-op for this simple implementation */ }
        };

        if (window.CMS && typeof window.CMS.registerMediaLibrary === 'function') {
          window.CMS.registerMediaLibrary(localLibrary);
        } else {
          // If CMS isn't initialized yet, wait for it
          window.addEventListener('decap:init', function () {
            if (window.CMS && typeof window.CMS.registerMediaLibrary === 'function') {
              window.CMS.registerMediaLibrary(localLibrary);
            }
          });
        }
      })();
    </script>
  </body>
</html>
